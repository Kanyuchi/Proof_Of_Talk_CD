<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Proof of Talk — Matchmaker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #050505; height: 100%; overflow: hidden; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #f5f4ef; }
  #root { width: 100vw; height: 100vh; }

    /* Mobile portrait hint — the video is 16:9, looks tiny in portrait.
       Asks the viewer to rotate. Hidden in landscape and on desktops. */
    .rotate-hint { display: none; }
    @media (max-width: 720px) and (orientation: portrait) {
      .rotate-hint {
        display: flex;
        position: fixed; inset: 0;
        background: rgba(8,8,8,0.95);
        color: #f5f4ef;
        align-items: center; justify-content: center;
        flex-direction: column; gap: 18px;
        font-family: 'Inter', system-ui, sans-serif;
        z-index: 2000;
        text-align: center; padding: 24px;
        animation: rotate-hint-dismiss 4.5s ease-out forwards;
      }
      @keyframes rotate-hint-dismiss {
        0%, 70%  { opacity: 1; pointer-events: auto; }
        100%     { opacity: 0; pointer-events: none; visibility: hidden; }
      }
      .rotate-hint .icon {
        font-size: 56px;
        color: #f76a0c;
        animation: rotate-pulse 1.8s ease-in-out infinite;
      }
      .rotate-hint .title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
      .rotate-hint .sub { font-size: 14px; color: rgba(245,244,239,0.6); max-width: 280px; line-height: 1.5; }
      @keyframes rotate-pulse {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
    }

  /* v5 snapshot ribbon */
  .ver-ribbon {
    position: fixed; top: 14px; right: 14px; z-index: 200;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(247,106,12,0.95); letter-spacing: 0.18em; text-transform: uppercase;
    background: rgba(247,106,12,0.10); border: 1px solid rgba(247,106,12,0.45);
    padding: 6px 12px; border-radius: 999px;
    text-decoration: none;
  }
  .ver-ribbon:hover { background: rgba(247,106,12,0.2); }

    /* Hide the default scrubber chrome from Stage — we want a pure video feel.
       The Stage component renders a 44px control bar; we override its container. */
    .anim-stage > div:last-child { display: none !important; }

    /* Custom mini-controls bottom-right */
    .pot-controls {
      position: fixed;
      bottom: 18px;
      right: 22px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 100;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(245,244,239,0.55);
      letter-spacing: 0.06em;
      user-select: none;
    }
    .pot-controls button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(245,244,239,0.85);
      padding: 6px 14px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }
    .pot-controls button:hover {
      background: rgba(247,106,12,0.12);
      border-color: rgba(247,106,12,0.4);
      color: #f76a0c;
    }
    .pot-progress {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .pot-progress > div {
      height: 100%;
      background: #f76a0c;
      transition: width 60ms linear;
    }

    /* Letterbox the stage */
    .stage-wrap {
      width: 100vw;
      height: 100vh;
      background: #050505;
      display: block;
      position: relative;
    }
  </style>
</head>
<body>
  <div class="rotate-hint">
    <div class="icon">⟳</div>
    <div class="title">Rotate your phone</div>
    <div class="sub">Best viewed in landscape. Tap to rotate or turn your device.</div>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="video.jsx"></script>
  <script type="text/babel" src="video2.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
