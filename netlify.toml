# Netlify configuration for POT Matchmaker
# Frontend is deployed here; backend API runs on EC2.
# The [[redirects]] proxy rules forward /api/* calls to the EC2 backend
# so the frontend's relative baseURL ("/api/v1") works correctly.

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── API proxy — forward all /api/* and /health to Railway backend ──────────
# Backend: Railway (x-ventures Pro plan)
# Previous: EC2 at 3.239.218.239 (personal AWS, decommissioned)

[[redirects]]
  from   = "/api/*"
  to     = "https://proofoftalkcd-production.up.railway.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "https://proofoftalkcd-production.up.railway.app/health"
  status = 200
  force  = true

# ── SPA fallback — all other routes serve index.html (React Router) ────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
